<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <rect width="32" height="32" rx="8" fill="#050506"/>
  <!-- origin waypoint -->
  <circle cx="8" cy="22" r="2" fill="#6BA5FF"/>
  <!-- mid waypoint -->
  <circle cx="16" cy="13" r="1.7" stroke="#6BA5FF" stroke-width="1.5"/>
  <!-- destination pin -->
  <path d="M24 6 C26 6 27.5 7.6 27.5 9.6 C27.5 12 24 15 24 15 C24 15 20.5 12 20.5 9.6 C20.5 7.6 22 6 24 6 Z"
